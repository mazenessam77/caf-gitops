apiVersion: apps/v1
kind: Deployment
metadata:
  name: caf-app
  labels:
    app: caf
spec:
  replicas: 3
  selector:
    matchLabels:
      app: caf
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime guarantee
  template:
    metadata:
      labels:
        app: caf
    spec:
      containers:
        - name: caf
          image: 541405370428.dkr.ecr.us-east-1.amazonaws.com/caf-app:60a3584
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "1.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
